name: Build Linux Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend tests
        run: python -m pytest backend/tests/ -v

      - name: Run frontend tests
        run: npm run test -- --run
        working-directory: frontend

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      # Tauri Linux dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli

      # --- Step 1: Build frontend ---
      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # --- Step 2: Build Python sidecar ---
      - name: Build sidecar
        run: bash scripts/build-sidecar.sh

      # --- Step 3: Build Tauri app ---
      - name: Build Tauri installer
        run: cargo tauri build
        working-directory: src-tauri

      # --- Upload artifacts ---
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: synced-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: synced-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
