name: Build Windows Installer

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # --- Setup toolchains ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # --- Install dependencies ---
      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli

      # --- Step 1: Build frontend ---
      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # --- Step 2: Build Python sidecar ---
      - name: Verify frontend built
        run: Test-Path backend\static\index.html
        shell: pwsh

      - name: Build sidecar
        run: |
          $triple = (rustc -vV | Select-String "host:").ToString().Split(" ")[1]
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          pyinstaller `
            --onefile `
            --name ghostchat-server `
            --add-data "backend\static;backend\static" `
            --distpath src-tauri\binaries `
            --workpath build\pyinstaller `
            --specpath build `
            --exclude-module numpy `
            --exclude-module PIL `
            --exclude-module Pillow `
            --exclude-module tkinter `
            --exclude-module _tkinter `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module pandas `
            --exclude-module pytest `
            --exclude-module pygments `
            --exclude-module rich `
            --exclude-module chardet `
            backend\sidecar_entry.py
          $exe = Join-Path "src-tauri" "binaries" "ghostchat-server.exe"
          $target = Join-Path "src-tauri" "binaries" "ghostchat-server-$triple.exe"
          Move-Item -Force $exe $target
          Write-Host "Sidecar built: $target"
        shell: pwsh

      # --- Step 3: Build Tauri app ---
      - name: Build Tauri installer
        run: cargo tauri build
        working-directory: src-tauri

      # --- Upload artifacts ---
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ghostchat-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: ghostchat-windows-exe
          path: src-tauri/target/release/GhostChat.exe
